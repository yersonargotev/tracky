[graph]
all-features = true
targets = [
  "aarch64-apple-darwin",
  "x86_64-apple-darwin",
  "x86_64-unknown-linux-gnu",
]

[advisories]
# Transitive abandonment is reviewed separately; vulnerabilities, unsoundness,
# and yanked packages still fail. Workspace dependencies must remain maintained.
unmaintained = "workspace"
ignore = []

[licenses]
confidence-threshold = 0.93
allow = [
  "0BSD",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "BSL-1.0",
  "CDLA-Permissive-2.0",
  "ISC",
  "MIT",
  "Unicode-3.0",
  "Unlicense",
  "Zlib",
]
exceptions = [
  # Reviewed for static distribution. Keep MPL obligations visible in notices.
  { allow = ["MPL-2.0"], crate = "option-ext@0.2.0" },
]

[bans]
# Existing duplicates are retained as a frozen inventory; security-sensitive
# storage crates must never resolve more than once.
multiple-versions = "warn"
wildcards = "deny"
deny = [
  { crate = "libsqlite3-sys", deny-multiple-versions = true },
  { crate = "rusqlite", deny-multiple-versions = true },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
