accepted = [
  "0BSD",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "BSL-1.0",
  "CDLA-Permissive-2.0",
  "ISC",
  "MIT",
  "Unicode-3.0",
  "Unlicense",
  "Zlib",
]
targets = [
  "aarch64-apple-darwin",
  "x86_64-apple-darwin",
  "x86_64-unknown-linux-gnu",
]
ignore-dev-dependencies = true
ignore-transitive-dependencies = false
private = { ignore = true }
workarounds = ["chrono", "rustix"]

[option-ext]
# Explicitly reviewed; MPL source-file obligations remain visible in notices.
accepted = ["MPL-2.0"]
