name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Rust checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Install stable Rust with Clippy and rustfmt
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: 1.93.0
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Run tests
        run: cargo test --locked --all-targets
      - name: Run real-browser dashboard flow
        env:
          PLAYWRIGHT_BROWSERS_PATH: ${{ runner.temp }}/tracky-playwright-browsers
        run: |
          npm install --global @playwright/cli@0.1.14 axe-core@4.10.3
          playwright-cli install-browser chromium --with-deps
          playwright-cli install-browser firefox --with-deps
          playwright-cli install-browser webkit --with-deps
          cargo build --locked --bin tracky
          python3 tests/dashboard_browser_flow.py --binary target/debug/tracky --browser chrome
          python3 tests/dashboard_browser_flow.py --binary target/debug/tracky --browser firefox
          python3 tests/dashboard_browser_flow.py --binary target/debug/tracky --browser webkit
      - name: Run Clippy
        run: cargo clippy --locked --all-targets --all-features -- -D warnings
      - name: Build release binary
        run: cargo build --locked --release --bin tracky

  dashboard-evidence:
    name: Dashboard evidence foundation
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: Install frozen Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: 1.93.0
      - name: Enforce advisories, licenses, sources, and duplicate policy
        uses: EmbarkStudios/cargo-deny-action@3c6349835b2b7b196a839186cb8b78e02f7b5f25 # v2.1.1, cargo-deny 0.20.2
        with:
          command: check
          arguments: --all-features --locked
          command-arguments: advisories bans licenses sources
      - name: Install cargo-about 0.9.1
        shell: bash
        run: |
          curl --proto '=https' --tlsv1.2 -LsSfO https://github.com/EmbarkStudios/cargo-about/releases/download/0.9.1/cargo-about-0.9.1-x86_64-unknown-linux-musl.tar.gz
          curl --proto '=https' --tlsv1.2 -LsSfO https://github.com/EmbarkStudios/cargo-about/releases/download/0.9.1/cargo-about-0.9.1-x86_64-unknown-linux-musl.tar.gz.sha256
          echo "$(cat cargo-about-0.9.1-x86_64-unknown-linux-musl.tar.gz.sha256)  cargo-about-0.9.1-x86_64-unknown-linux-musl.tar.gz" | sha256sum --check -
          tar --extract --gzip --file cargo-about-0.9.1-x86_64-unknown-linux-musl.tar.gz
          echo "$PWD/cargo-about-0.9.1-x86_64-unknown-linux-musl" >> "$GITHUB_PATH"
      - name: Validate evidence tools and frozen inputs
        run: |
          python3 -m unittest tests/dashboard_evidence_tool.py
          python3 scripts/dashboard_evidence.py check
      - name: Verify dependency inventory and notices
        shell: bash
        run: |
          set -o pipefail
          python3 scripts/dashboard_evidence.py inventory
          cargo-about generate --frozen evidence/dashboard/third-party-notices.hbs \
            | python3 -c 'import sys; print("\n".join(line.rstrip() for line in sys.stdin.read().rstrip().splitlines()))' \
            > THIRD-PARTY-NOTICES
          test -s THIRD-PARTY-NOTICES
          git diff --exit-code -- evidence/dashboard/dependency-inventory.json THIRD-PARTY-NOTICES
