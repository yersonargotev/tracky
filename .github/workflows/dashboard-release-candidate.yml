name: Build dashboard release candidate

on:
  workflow_dispatch:
    inputs:
      accepted_sha:
        description: Exact lowercase 40-character commit SHA to build
        required: true
        type: string

permissions:
  contents: read

jobs:
  build:
    name: Candidate (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            target: aarch64-apple-darwin
          - runner: macos-15-intel
            target: x86_64-apple-darwin
          - runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Validate the accepted commit SHA
        env:
          ACCEPTED_SHA: ${{ inputs.accepted_sha }}
        shell: bash
        run: |
          if [[ ! "$ACCEPTED_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "accepted_sha must be exactly 40 lowercase hexadecimal characters" >&2
            exit 1
          fi
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ inputs.accepted_sha }}
          persist-credentials: false
      - name: Verify the checked-out commit
        env:
          ACCEPTED_SHA: ${{ inputs.accepted_sha }}
        shell: bash
        run: test "$(git rev-parse HEAD)" = "$ACCEPTED_SHA"
      - name: Install the frozen Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: 1.93.0
      - name: Install Cargo Dist 0.32.0
        shell: bash
        run: |
          curl --proto '=https' --tlsv1.2 -LsSf \
            --output cargo-dist-installer.sh \
            https://github.com/axodotdev/cargo-dist/releases/download/v0.32.0/cargo-dist-installer.sh
          echo 'b657cf8c04a8b7bc28f39d220f7e6dd11bbd2bdb072c552262bd9ccf597261b5  cargo-dist-installer.sh' \
            | shasum -a 256 --check
          sh cargo-dist-installer.sh
      - name: Build the local release artifact
        shell: bash
        run: dist build --artifacts=local --target=${{ matrix.target }} --output-format=json > dist-manifest.json
      - name: Extract the candidate binary
        env:
          TARGET: ${{ matrix.target }}
        shell: bash
        run: |
          mkdir -p extracted
          tar -xJf "target/distrib/tracky-${TARGET}.tar.xz" -C extracted
          test -x "extracted/tracky-${TARGET}/tracky"
      - name: Test the extracted candidate binary
        env:
          TRACKY_TEST_BINARY: ${{ github.workspace }}/extracted/tracky-${{ matrix.target }}/tracky
        shell: bash
        run: cargo test --locked --test dashboard_cli
      - name: Measure the packaged dashboard runtime
        shell: bash
        run: |
          python3 scripts/dashboard_candidate_runtime.py \
            --binary "extracted/tracky-${{ matrix.target }}/tracky" \
            --target "${{ matrix.target }}" \
            --output runtime-evidence.json
      - name: Record the candidate fragment
        env:
          ACCEPTED_SHA: ${{ inputs.accepted_sha }}
          TARGET: ${{ matrix.target }}
        shell: bash
        run: |
          python3 - <<'PY'
          import hashlib
          import json
          import os
          import pathlib
          import subprocess
          import tarfile

          target = os.environ["TARGET"]
          archive = pathlib.Path("target/distrib") / f"tracky-{target}.tar.xz"
          with tarfile.open(archive, "r:xz") as bundle:
              executable = next(
                  member for member in bundle.getmembers()
                  if member.isfile() and pathlib.PurePosixPath(member.name).name == "tracky"
              )
              stream = bundle.extractfile(executable)
              assert stream is not None
              executable_content = stream.read()

          def sha256(content):
              return hashlib.sha256(content).hexdigest()

          archive_content = archive.read_bytes()
          lockfile_content = pathlib.Path("Cargo.lock").read_bytes()
          runtime = json.loads(pathlib.Path("runtime-evidence.json").read_text(encoding="utf-8"))
          assert runtime["target"] == target
          fragment = {
              "target": target,
              "commit": os.environ["ACCEPTED_SHA"],
              "lockfile_sha256": sha256(lockfile_content),
              "tools": {
                  "rustc": subprocess.check_output(["rustc", "--version"], text=True).strip(),
                  "cargo": subprocess.check_output(["cargo", "--version"], text=True).strip(),
                  "cargo-dist": subprocess.check_output(["dist", "--version"], text=True).strip(),
              },
              "artifact": {
                  "name": archive.name,
                  "sha256": sha256(archive_content),
                  "bytes": len(archive_content),
              },
              "latency": runtime["latency"],
              "resources": runtime["resources"],
              "size": {
                  "target": target,
                  "archive_bytes": len(archive_content),
                  "archive_sha256": sha256(archive_content),
                  "executable_bytes": len(executable_content),
                  "executable_sha256": sha256(executable_content),
              },
              "commands": [
                  f"dist build --artifacts=local --target={target} --output-format=json",
                  "cargo test --locked --test dashboard_cli",
                  *runtime["commands"],
              ],
          }
          pathlib.Path(f"{target}.json").write_text(
              json.dumps(fragment, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY
      - name: Retain the candidate artifact and measured fragment
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dashboard-release-candidate-${{ inputs.accepted_sha }}-${{ matrix.target }}
          path: |
            target/distrib/tracky-${{ matrix.target }}.tar.xz
            target/distrib/tracky-${{ matrix.target }}.tar.xz.sha256
            ${{ matrix.target }}.json
            runtime-evidence.json
          if-no-files-found: error
          retention-days: 90
