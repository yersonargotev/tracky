name: Retain dashboard manual accessibility evidence

on:
  workflow_dispatch:
    inputs:
      accepted_sha:
        description: Exact lowercase 40-character candidate commit SHA
        required: true
        type: string
      submission_url:
        description: HTTPS URL for the completed and signed manual accessibility JSON
        required: true
        type: string
      submission_sha256:
        description: SHA-256 of the signed manual accessibility JSON
        required: true
        type: string

permissions:
  actions: read
  contents: read

jobs:
  retain:
    name: Validate signed manual accessibility evidence
    runs-on: ubuntu-22.04
    environment: dashboard-release
    steps:
      - name: Validate the accepted commit SHA
        env:
          ACCEPTED_SHA: ${{ inputs.accepted_sha }}
        shell: bash
        run: |
          if [[ ! "$ACCEPTED_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "accepted_sha must be exactly 40 lowercase hexadecimal characters" >&2
            exit 1
          fi
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ inputs.accepted_sha }}
          persist-credentials: false
      - name: Verify the checked-out commit
        env:
          ACCEPTED_SHA: ${{ inputs.accepted_sha }}
        shell: bash
        run: test "$(git rev-parse HEAD)" = "$ACCEPTED_SHA"
      - name: Fetch the hash-pinned signed submission
        env:
          SUBMISSION_SHA256: ${{ inputs.submission_sha256 }}
          SUBMISSION_URL: ${{ inputs.submission_url }}
        shell: bash
        run: |
          case "$SUBMISSION_URL" in https://*) ;; *) echo "submission URL must use HTTPS" >&2; exit 1;; esac
          if [[ ! "$SUBMISSION_SHA256" =~ ^[0-9a-f]{64}$ ]]; then
            echo "submission_sha256 must be exactly 64 lowercase hexadecimal characters" >&2
            exit 1
          fi
          curl --proto '=https' --tlsv1.2 --fail --location \
            --output manual-accessibility.submission.json "$SUBMISSION_URL"
          echo "$SUBMISSION_SHA256  manual-accessibility.submission.json" | sha256sum --check --strict
      - name: Validate the exact-SHA signed submission
        id: submission
        env:
          ACCEPTED_SHA: ${{ inputs.accepted_sha }}
          RESPONSIBLE_MAINTAINER: ${{ github.actor }}
        shell: bash
        run: |
          lockfile_sha256=$(sha256sum Cargo.lock | cut -d ' ' -f 1)
          python3 scripts/dashboard_accessibility_evidence.py validate \
            manual-accessibility.submission.json \
            --commit "$ACCEPTED_SHA" \
            --lockfile-sha256 "$lockfile_sha256"
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json, os
          value = json.load(open("manual-accessibility.submission.json", encoding="utf-8"))
          if value["responsible_maintainer"] != os.environ["RESPONSIBLE_MAINTAINER"]:
              raise SystemExit("responsible maintainer must be the authenticated workflow dispatcher")
          print("candidate_run_id=%d" % value["candidate_run_id"])
          PY
      - name: Verify the candidate run provenance
        env:
          CANDIDATE_RUN_ID: ${{ steps.submission.outputs.candidate_run_id }}
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          python3 - <<'PY'
          import json, os, urllib.request
          repository = os.environ["GITHUB_REPOSITORY"]
          request = urllib.request.Request(
              "https://api.github.com/repos/%s/actions/runs/%s" % (repository, os.environ["CANDIDATE_RUN_ID"]),
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": "Bearer " + os.environ["GH_TOKEN"],
                  "X-GitHub-Api-Version": "2022-11-28",
              },
          )
          with urllib.request.urlopen(request) as response:
              run = json.load(response)
          expected = {
              "conclusion": "success",
              "event": "workflow_dispatch",
              "path": ".github/workflows/dashboard-release-candidate.yml",
          }
          if any(run.get(field) != value for field, value in expected.items()):
              raise SystemExit("candidate run is not a successful dashboard release candidate workflow_dispatch")
          if run.get("repository", {}).get("full_name") != repository:
              raise SystemExit("candidate run belongs to another repository")
          PY
      - name: Download both exact candidate artifacts
        uses: actions/download-artifact@484a0b528fb4d7bd804637ccb632e47a0e638317 # v8
        with:
          github-token: ${{ github.token }}
          run-id: ${{ steps.submission.outputs.candidate_run_id }}
          pattern: dashboard-release-candidate-${{ inputs.accepted_sha }}-*
          path: candidates
      - name: Bind, finalize, and render the retained evidence
        env:
          ACCEPTED_SHA: ${{ inputs.accepted_sha }}
          RETAINED_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          lockfile_sha256=$(sha256sum Cargo.lock | cut -d ' ' -f 1)
          python3 scripts/dashboard_accessibility_evidence.py finalize \
            manual-accessibility.submission.json \
            --commit "$ACCEPTED_SHA" \
            --lockfile-sha256 "$lockfile_sha256" \
            --candidates-dir candidates \
            --run-url "$RETAINED_RUN_URL" \
            --output manual-accessibility.json
          python3 scripts/dashboard_accessibility_evidence.py render \
            manual-accessibility.json --output manual-accessibility.md
      - name: Retain canonical and submitted evidence for the matching commit
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dashboard-accessibility-evidence-${{ inputs.accepted_sha }}
          path: |
            manual-accessibility.submission.json
            manual-accessibility.json
            manual-accessibility.md
          if-no-files-found: error
          retention-days: 90
